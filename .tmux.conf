# ============================================
# TMUX Configuration
# ============================================

# Set true color support
set-option -sa terminal-overrides ",xterm*:Tc"

# Enable mouse support
set -g mouse on

# Set prefix to Ctrl-a (more ergonomic than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ============================================
# Vim-style pane navigation with tmux-navigator
# ============================================
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator

# Decide whether we're in a Vim process
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'

if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# ============================================
# Pane splitting (more intuitive)
# ============================================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ============================================
# Pane resizing
# ============================================
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================
# Copy mode (vim-style)
# ============================================
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ============================================
# Reload config
# ============================================
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ============================================
# Status bar - Modern Catppuccin Theme
# ============================================
set -g status-position top
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-interval 1

# Left side - Session name with icon
set -g status-left '#[fg=#1e1e2e,bg=#89b4fa,bold] 󰣇 #S #[fg=#89b4fa,bg=#1e1e2e]'
set -g status-left-length 50

# Right side - Date, time, and system info
set -g status-right '#[fg=#313244,bg=#1e1e2e]#[fg=#cdd6f4,bg=#313244] %Y-%m-%d #[fg=#45475a,bg=#313244]#[fg=#cdd6f4,bg=#45475a] 󰥔 %H:%M:%S #[fg=#89b4fa,bg=#45475a]#[fg=#1e1e2e,bg=#89b4fa,bold] #H '
set -g status-right-length 100

# Window status - Current
setw -g window-status-current-style 'fg=#1e1e2e bg=#f9e2af bold'
setw -g window-status-current-format '#[fg=#1e1e2e,bg=#f9e2af]#[fg=#1e1e2e,bg=#f9e2af,bold] #I #W #F #[fg=#f9e2af,bg=#1e1e2e]'

# Window status - Inactive
setw -g window-status-style 'fg=#cdd6f4 bg=#313244'
setw -g window-status-format '#[fg=#1e1e2e,bg=#313244]#[fg=#cdd6f4,bg=#313244] #I #W #F #[fg=#313244,bg=#1e1e2e]'

# Window separator
setw -g window-status-separator ''

# ============================================
# Pane borders
# ============================================
set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#89b4fa'

# ============================================
# Dim inactive panes
# ============================================
set -g window-style 'fg=#6c7086,bg=#181825'
set -g window-active-style 'fg=#cdd6f4,bg=#1e1e2e'

# ============================================
# Message style
# ============================================
set -g message-style 'fg=#1e1e2e bg=#89b4fa bold'
